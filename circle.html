<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>360° Video Cylinder 10° Segments</title>
<style>
  body { margin: 0; overflow: hidden; background: #000; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="glcanvas"></canvas>

<video id="video" src="video.mp4" loop muted playsinline style="display:none"></video>
<audio id="audio" src="video.mp4" loop></audio>

<script>
const canvas = document.getElementById('glcanvas');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const gl = canvas.getContext('webgl');
if (!gl) alert("WebGL not supported");

// ---- Settings ----
const SEGMENT_DEG = Math.PI; // Each plane spans 10°
const TOTAL_PLANES = Math.ceil(360 / SEGMENT_DEG);
const SEGMENT_RAD = SEGMENT_DEG * Math.PI / 180; // Convert to radians
const RADIUS = 3600;
const PLANE_HEIGHT = Math.PI;
const SUBDIVISIONS = 3; // vertices per plane for smooth curve

// ---- Video ----
const video = document.getElementById('video');
video.play();
const audio = document.getElementById('audio');
audio.play();

// ---- Shaders ----
const vsSource = `
attribute vec3 aPosition;
attribute vec2 aTexCoord;
uniform mat4 uModelViewMatrix;
uniform mat4 uProjectionMatrix;
varying vec2 vTexCoord;
void main() {
  gl_Position = uProjectionMatrix * uModelViewMatrix * vec4(aPosition, 1.0);
  vTexCoord = aTexCoord;
}`;
const fsSource = `
precision mediump float;
varying vec2 vTexCoord;
uniform sampler2D uSampler;
void main() {
  gl_FragColor = texture2D(uSampler, vTexCoord);
}`;

// ---- Compile Shaders ----
function compileShader(src, type){
  const shader = gl.createShader(type);
  gl.shaderSource(shader, src);
  gl.compileShader(shader);
  if(!gl.getShaderParameter(shader, gl.COMPILE_STATUS))
    console.error(gl.getShaderInfoLog(shader));
  return shader;
}
const vertexShader = compileShader(vsSource, gl.VERTEX_SHADER);
const fragmentShader = compileShader(fsSource, gl.FRAGMENT_SHADER);

const program = gl.createProgram();
gl.attachShader(program, vertexShader);
gl.attachShader(program, fragmentShader);
gl.linkProgram(program);
gl.useProgram(program);

// ---- Curved plane geometry facing inward ----
function createCurvedPlane(segmentRad){
  const positions = [];
  const texCoords = [];
  const indices = [];
  
  for(let i = 0; i <= SUBDIVISIONS; i++){
    const t = i / SUBDIVISIONS;
    const theta = segmentRad/2 - t*segmentRad; // inverted for inside view
    const x = RADIUS * Math.sin(theta);
    const z = RADIUS * (1 - Math.cos(theta));
    
    positions.push(x, -PLANE_HEIGHT/2, z);
    positions.push(x,  PLANE_HEIGHT/2, z);
    
    texCoords.push(1 - t, 1); // flip horizontally
    texCoords.push(1 - t, 0);
  }
  
  for(let i=0;i<SUBDIVISIONS;i++){
    const idx = i*2;
    indices.push(idx, idx+2, idx+1);
    indices.push(idx+1, idx+2, idx+3);
  }
  
  return {positions: new Float32Array(positions), texCoords: new Float32Array(texCoords), indices: new Uint16Array(indices)};
}

const plane = createCurvedPlane(SEGMENT_RAD);

// ---- Buffers ----
const posBuffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, posBuffer);
gl.bufferData(gl.ARRAY_BUFFER, plane.positions, gl.STATIC_DRAW);

const texBuffer = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, texBuffer);
gl.bufferData(gl.ARRAY_BUFFER, plane.texCoords, gl.STATIC_DRAW);

const indexBuffer = gl.createBuffer();
gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, indexBuffer);
gl.bufferData(gl.ELEMENT_ARRAY_BUFFER, plane.indices, gl.STATIC_DRAW);

// ---- Attributes ----
const aPosition = gl.getAttribLocation(program, 'aPosition');
gl.enableVertexAttribArray(aPosition);
gl.bindBuffer(gl.ARRAY_BUFFER, posBuffer);
gl.vertexAttribPointer(aPosition, 3, gl.FLOAT, false, 0, 0);

const aTexCoord = gl.getAttribLocation(program, 'aTexCoord');
gl.enableVertexAttribArray(aTexCoord);
gl.bindBuffer(gl.ARRAY_BUFFER, texBuffer);
gl.vertexAttribPointer(aTexCoord, 2, gl.FLOAT, false, 0, 0);

// ---- Uniforms ----
const uProjectionMatrix = gl.getUniformLocation(program, 'uProjectionMatrix');
const uModelViewMatrix = gl.getUniformLocation(program, 'uModelViewMatrix');
const uSampler = gl.getUniformLocation(program, 'uSampler');

// ---- Matrices ----
function perspective(fovy, aspect, near, far){
  const f = 1.0 / Math.tan(fovy/2);
  return new Float32Array([
    f/aspect,0,0,0,
    0,f,0,0,
    0,0,(far+near)/(near-far),-1,
    0,0,(2*far*near)/(near-far),0
  ]);
}
function rotationYMatrix(angle){
  const c = Math.cos(angle), s = Math.sin(angle);
  return new Float32Array([
    c,0,s,0,
    0,1,0,0,
    -s,0,c,0,
    0,0,0,1
  ]);
}
function rotationXMatrix(angle){
  const c = Math.cos(angle), s = Math.sin(angle);
  return new Float32Array([
    1,0,0,0,
    0,c,-s,0,
    0,s,c,0,
    0,0,0,1
  ]);
}
function multiplyMatrices(a,b){
  const out = new Float32Array(16);
  for(let i=0;i<4;i++){
    for(let j=0;j<4;j++){
      out[j*4+i] = 0;
      for(let k=0;k<4;k++){
        out[j*4+i] += a[k*4+i]*b[j*4+k];
      }
    }
  }
  return out;
}

// ---- Video texture ----
const texture = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, texture);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);

// ---- Orbit Camera ----
let yaw=0, pitch=0, dragging=false, lastX, lastY;
canvas.addEventListener('mousedown', e=>{ dragging=true; lastX=e.clientX; lastY=e.clientY; });
canvas.addEventListener('mouseup', ()=>dragging=false);
canvas.addEventListener('mousemove', e=>{
  if(dragging){
    yaw += (e.clientX-lastX)*0.005;
    pitch += (e.clientY-lastY)*0.005;
    pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
    lastX = e.clientX; lastY = e.clientY;
  }
});

// ---- Render loop ----
function render(){
  gl.viewport(0,0,canvas.width,canvas.height);
  gl.clearColor(0,0,0,1);
  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
  gl.enable(gl.DEPTH_TEST);

  gl.bindTexture(gl.TEXTURE_2D, texture);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGB,gl.RGB,gl.UNSIGNED_BYTE,video);

  const proj = perspective(Math.PI/4, canvas.width/canvas.height, 0.1, 1000);
  gl.uniformMatrix4fv(uProjectionMatrix, false, proj);

  const camRotY = rotationYMatrix(-yaw);
  const camRotX = rotationXMatrix(-pitch);
  const camTrans = multiplyMatrices(camRotX, camRotY);

  for(let i=0;i<TOTAL_PLANES;i++){
    const angle = (i*SEGMENT_DEG) * Math.PI/180;
    const planeRot = rotationYMatrix(angle);
    const model = multiplyMatrices(camTrans, planeRot);

    gl.uniformMatrix4fv(uModelViewMatrix, false, model);

    gl.activeTexture(gl.TEXTURE0);
    gl.bindTexture(gl.TEXTURE_2D, texture);
    gl.uniform1i(uSampler, 0);

    gl.bindBuffer(gl.ELEMENT_ARRAY_BUFFER, indexBuffer);
    gl.drawElements(gl.TRIANGLES, plane.indices.length, gl.UNSIGNED_SHORT,0);
  }

  requestAnimationFrame(render);
}

render();
</script>
</body>
</html>
